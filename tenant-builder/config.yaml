# Scraping configuration
scraping:
  firecrawl:
    formats:
      - markdown
      # Note: 'images' format not available in API — images extracted from markdown via regex
      - links
      - html
    image_scrape_actions:   # Actions to trigger lazy-loaded images before scraping
      - type: scroll
        direction: down
      - type: wait
        milliseconds: 2000
      - type: scroll
        direction: down
      - type: wait
        milliseconds: 1000
    timeout_ms: 30000
    map_limit: 50     # Max URLs to discover via map() endpoint
    max_pages_per_site: 16  # Increased from 6 — map() discovers more relevant pages
    rate_limit:
      requests_per_minute: 30
      retry_on_429: true
      backoff: exponential    # 1s, 2s, 4s, 8s...
    fallback_pages:
      - /about
      - /about-us
      - /services
      - /contact
      - /gallery
      - /portfolio
      - /testimonials
      - /reviews
  # AI enrichment model for content extraction from markdown
  enrichment_model: sonnet
  # Max turns for claude CLI calls
  max_turns: 3

# Logo extraction
logo:
  min_width: 100            # Minimum logo width in pixels
  max_width: 800            # Maximum logo width in pixels
  preferred_formats:        # Priority order for logo format
    - svg
    - png
    - webp
    - jpg
  storage_path_template: "{site_id}/logo"

# Content Architect — GPT 5.4 deep content extraction from scraped data
content_architect:
  enabled: true
  timeout_seconds: 180       # Codex call ~2-3 min for full content extraction

# Architect — Opus 4.6 site analysis → SiteBlueprint v2
architect:
  enabled: true
  timeout_seconds: 600       # Increased from 300 — Opus consistently times out at 450s on complex sites
  fallback_to_defaults: true

# Custom Sections — Codex-generated per-tenant React components
custom_sections:
  enabled: true
  max_per_tenant: 15          # Bespoke builds need 8-15 sections
  compilation_required: true
  codex_timeout_seconds: 600  # Large prompts + vision images need 5-10 min per section

# Provisioning
provisioning:
  default_tier: accelerate
  domain_template: "{slug}.norbotsystems.com"
  proxy_ts_path: src/proxy.ts

# Quality Assurance
qa:
  thresholds:
    average_min: 4.0        # Minimum average across 5 dimensions
    dimension_min: 3.0      # No single dimension below this
  dimensions:
    - logo_fidelity
    - colour_match
    - copy_accuracy
    - layout_integrity
    - brand_cohesion
  max_refinement_iterations: 5
  screenshot:
    desktop_viewport:
      width: 1280
      height: 720
    mobile_viewport:
      width: 375
      height: 812
    storage_path_template: "{site_id}/qa"

# Concurrency
concurrency:
  default: 4
  max: 8

# Discovery — Firecrawl search settings
discovery:
  search_templates:
    - "premium renovation contractor {city}"
    - "design build firm {city} portfolio"
    - "kitchen bathroom renovation company {city} reviews"
    - "luxury home renovation {city}"
    - "award winning contractor {city}"
  # Canada-specific templates (appended for Canadian cities)
  search_templates_ca:
    - "renovation contractor {city} Canada"
    - "home renovation company {city}"
  # US-specific templates (appended for US cities)
  search_templates_us:
    - "renovation contractor {city}"
    - "home remodeling company {city}"
  quality_floor:
    min_google_reviews: 10
    min_google_rating: 3.5
    reject_directory_listings: true
  max_results_per_city: 10
  us_expansion_enabled: false   # Gate US discovery until sending domain is warmed
  active_cities:
    # Ring 1 — Home base
    - Kitchener
    - Waterloo
    - Cambridge
    - Guelph
    - Stratford
    - Woodstock
    # Ring 2 — Day trip
    - London
    - Brantford
    - Hamilton
    - Ingersoll
    - Tillsonburg
    - St. Thomas
    # Ring 3 — GTA
    - Toronto
    - Oakville
    - Burlington
    - Mississauga
    - Brampton
    - Markham
    - Vaughan
    # Ring 4 — Ontario expanded (immediate activation)
    - Ottawa
    - Niagara Falls
    - St. Catharines
    - Peterborough
    - Windsor
    - Sarnia
    - Sudbury
    - Barrie
    - Orillia
    - Collingwood
    - Owen Sound
    # Ring 5 — Rest of Canada (activate week 2)
    - Vancouver
    - Calgary
    - Edmonton
    - Montreal
    - Halifax
    - Winnipeg
    - Victoria
    - Kelowna
    - Surrey
    - Ottawa

# Nightly schedule
nightly:
  limit: 20                 # Start conservative, tune to 30 based on first run success rate
  concurrency: 6            # Raised from 4 — Max subscription has doubled limits for 2 weeks
  wave_size: 15             # Targets per deploy wave (build wave → deploy → QA wave, overlap next build)
  skip_provisioned: true    # Skip targets that already have a demo tenant

# Design Director — vision-based Design Language production
design_director:
  enabled: true
  gemini_model: 'gemini-3.1-pro-preview'
  opus_cross_check: true
  scroll_recording: true
  recording_duration_seconds: 30
  max_design_language_tokens: 4096

# Bespoke Pipeline — rebuild target's visual identity with Codex
bespoke:
  enabled: true
  css_extract_timeout_seconds: 60
  screenshot_viewports:
    - { width: 1440, height: 900, label: "desktop" }
    - { width: 390, height: 844, label: "mobile" }
    - { width: 768, height: 1024, label: "tablet" }
  max_custom_sections: 15       # Higher limit than template pipeline (was 5)
  visual_similarity_threshold: 3.5

# Warm Lead — higher-quality build settings for hand-crafted prospects
warm_lead:
  vqa_threshold: 4.0            # Visual QA minimum (vs default 3.5)
  ralph_max_iterations: 5       # Max refinement loop iterations (vs default 3)
  section_count:
    min: 10                     # Minimum sections per page
    max: 15                     # Maximum sections per page
  scrape_all_pages: true        # Scrape every discoverable page, not just top 6
  download_all_images: true     # Download all images locally (no CDN dependency)
  generate_hero_visualizer: true  # Generate before/after kitchen images for hero slider
  extract_full_palette: true    # Run palette extractor for full OKLCH globals_override
  copy_verification: true       # Verify copy fidelity against original site

# Go-Live Audit
audit:
  wcag_contrast_threshold: 4.5    # WCAG AA normal text ratio
  original_match_threshold: 80    # Minimum original-vs-demo match score (%)
  pdf_check_enabled: true
  email_check_enabled: true
  viewports:
    - { width: 1440, height: 900, label: "desktop" }
    - { width: 768, height: 1024, label: "tablet" }
    - { width: 390, height: 844, label: "mobile" }
