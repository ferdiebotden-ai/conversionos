# Tenant Builder Configuration
# All settings for the automated tenant onboarding pipeline.

# ICP Scoring — weights for demo-fitness assessment (total 130)
icp_scoring:
  weights:
    template_fit: 15
    website_quality: 20
    contact_completeness: 10
    google_reviews: 20
    geography: 15
    company_establishment: 15
    marketing_sophistication: 20
    years_in_business: 15
  thresholds:
    auto_proceed: 85
    manual_review: 65
    reject: 65
  # ICP-based routing: auto-split high-value leads from scale outreach
  icp_routing:
    warm_lead_threshold: 80    # Score 80+ → bespoke warm-lead build (Opus, Ferdie calls)
    tenant_threshold: 55       # Score 55-80 → template tenant build (Sonnet, scale outreach)
    reject_threshold: 55       # Score <55 → disqualified
