# Tenant Builder Configuration
# All settings for the automated tenant onboarding pipeline.

# ICP Scoring — weights for demo-fitness assessment (total 130)
icp_scoring:
  weights:
    template_fit: 15
    website_quality: 20
    contact_completeness: 10
    google_reviews: 20
    geography: 15
    company_establishment: 15
    marketing_sophistication: 20
    years_in_business: 15
  thresholds:
    auto_proceed: 85
    manual_review: 65
    reject: 65
  geographic_rings:
    ring_1:
      - Stratford
      - Woodstock
      - Kitchener
      - Waterloo
      - Cambridge
      - Guelph
      - New Hamburg
      - Listowel
      - Mitchell
      - Tavistock
    ring_2:
      - London
      - Brantford
      - Hamilton
      - Fergus
      - Orangeville
      - Ingersoll
      - Tillsonburg
      - St. Thomas
      - Elmira
      - Elora
      - Paris
      - Simcoe
      - Norfolk
      - Exeter
    ring_3:
      - Toronto
      - Oakville
      - Burlington
      - Barrie
      - Kingston
      - Mississauga
      - Brampton

# Scraping configuration
scraping:
  firecrawl:
    formats:
      - markdown
      - links
    timeout_ms: 30000
    max_pages_per_site: 6   # Homepage + about + services + contact + gallery + testimonials
    rate_limit:
      requests_per_minute: 30
      retry_on_429: true
      backoff: exponential    # 1s, 2s, 4s, 8s...
    fallback_pages:
      - /about
      - /about-us
      - /services
      - /contact
      - /gallery
      - /portfolio
      - /testimonials
      - /reviews
  # AI enrichment model for content extraction from markdown
  enrichment_model: sonnet
  # Max turns for claude CLI calls
  max_turns: 3

# Logo extraction
logo:
  min_width: 100            # Minimum logo width in pixels
  max_width: 800            # Maximum logo width in pixels
  preferred_formats:        # Priority order for logo format
    - svg
    - png
    - webp
    - jpg
  storage_path_template: "{site_id}/logo"

# Provisioning
provisioning:
  default_tier: accelerate
  domain_template: "{slug}.norbotsystems.com"
  proxy_ts_path: src/proxy.ts

# Quality Assurance
qa:
  thresholds:
    average_min: 4.0        # Minimum average across 5 dimensions
    dimension_min: 3.0      # No single dimension below this
  dimensions:
    - logo_fidelity
    - colour_match
    - copy_accuracy
    - layout_integrity
    - brand_cohesion
  max_refinement_iterations: 5
  screenshot:
    desktop_viewport:
      width: 1280
      height: 720
    mobile_viewport:
      width: 375
      height: 812
    storage_path_template: "{site_id}/qa"

# Concurrency
concurrency:
  default: 4
  max: 8

# Discovery — Firecrawl search settings
discovery:
  search_templates:
    - "premium renovation contractor {city} Ontario"
    - "design build firm {city} Ontario portfolio"
    - "kitchen bathroom renovation company {city} reviews"
    - "luxury home renovation {city} Ontario"
    - "award winning contractor {city} Ontario"
  quality_floor:
    min_google_reviews: 10
    min_google_rating: 3.5
    reject_directory_listings: true
  max_results_per_city: 10
  active_cities:
    - Kitchener
    - Waterloo
    - Cambridge
    - Guelph
    - London
    - Woodstock
    - Brantford
    - Hamilton
    - Oakville
    - Burlington
    - Stratford
    - Ingersoll
    - Tillsonburg
    - St. Thomas
    - Toronto

# Nightly schedule
nightly:
  limit: 10
  concurrency: 4
  skip_provisioned: true    # Skip targets that already have a demo tenant

# Go-Live Audit
audit:
  wcag_contrast_threshold: 4.5    # WCAG AA normal text ratio
  original_match_threshold: 80    # Minimum original-vs-demo match score (%)
  pdf_check_enabled: true
  email_check_enabled: true
  viewports:
    - { width: 1440, height: 900, label: "desktop" }
    - { width: 768, height: 1024, label: "tablet" }
    - { width: 390, height: 844, label: "mobile" }
